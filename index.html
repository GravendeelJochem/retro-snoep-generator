<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🍬 Retro Snoep Generator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f0c29;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      color: #fff;
      overflow-x: hidden;
    }

    h1 {
      text-align: center;
      font-size: 2.5rem;
      padding: 2rem 1rem 0.5rem;
      text-shadow: 0 0 30px rgba(255,200,50,0.8);
      letter-spacing: 2px;
    }

    h1 span { font-size: 2.8rem; }

    .subtitle {
      text-align: center;
      color: #aaa;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 1.5rem 4rem;
    }

    /* ── TABS ── */
    .tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      justify-content: center;
    }

    .tab {
      padding: 0.6rem 1.4rem;
      border-radius: 2rem;
      border: 2px solid rgba(255,255,255,0.2);
      background: transparent;
      color: #ccc;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    .tab.active, .tab:hover {
      background: rgba(255,200,50,0.15);
      border-color: #ffc832;
      color: #ffc832;
    }

    .panel { display: none; }
    .panel.active { display: block; }

    /* ── GENERATOR PANEL ── */
    .slot-machine {
      background: rgba(255,255,255,0.05);
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 1.5rem;
      padding: 2.5rem 2rem;
      text-align: center;
      margin-bottom: 2rem;
      backdrop-filter: blur(10px);
    }

    .slots {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin: 2rem 0;
      flex-wrap: wrap;
    }

    .slot-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .slot-label {
      font-size: 0.8rem;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .slot {
      width: 200px;
      height: 80px;
      background: rgba(0,0,0,0.4);
      border-radius: 1rem;
      border: 2px solid rgba(255,200,50,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      font-weight: 700;
      overflow: hidden;
      position: relative;
    }

    .slot-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: transform 0.05s linear;
    }

    .slot-item {
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 196px;
      padding: 0 0.5rem;
      text-align: center;
      line-height: 1.2;
    }

    .slot.winner {
      border-color: #ffc832;
      box-shadow: 0 0 30px rgba(255,200,50,0.5);
      animation: pulse 0.5s ease infinite alternate;
    }

    @keyframes pulse {
      from { box-shadow: 0 0 20px rgba(255,200,50,0.3); }
      to   { box-shadow: 0 0 40px rgba(255,200,50,0.8); }
    }

    .spin-btn {
      background: linear-gradient(135deg, #ffc832, #ff6b35);
      border: none;
      color: #fff;
      font-size: 1.4rem;
      font-weight: 800;
      padding: 1rem 3rem;
      border-radius: 3rem;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 2px;
      transition: transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 6px 25px rgba(255,200,50,0.4);
    }

    .spin-btn:hover { transform: scale(1.05); box-shadow: 0 8px 35px rgba(255,200,50,0.6); }
    .spin-btn:active { transform: scale(0.97); }
    .spin-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .result-card {
      background: linear-gradient(135deg, rgba(255,200,50,0.15), rgba(255,107,53,0.15));
      border: 2px solid rgba(255,200,50,0.5);
      border-radius: 1.5rem;
      padding: 2rem;
      margin-top: 2rem;
      display: none;
      animation: fadeIn 0.5s ease;
    }

    .result-card.show { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-person {
      font-size: 2rem;
      font-weight: 800;
      color: #ffc832;
      margin-bottom: 0.5rem;
    }

    .result-text { font-size: 1.1rem; color: #ddd; margin-bottom: 0.5rem; }
    .result-candy { font-size: 1.5rem; font-weight: 700; color: #ff6b35; }

    .history-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.6rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      font-size: 0.9rem;
      color: #bbb;
    }

    .history-item .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #ffc832;
      flex-shrink: 0;
    }

    /* ── CONFIG PANELS ── */
    .config-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 1rem;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .config-card h3 {
      font-size: 1rem;
      margin-bottom: 1rem;
      color: #ffc832;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .name-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 0.75rem;
    }

    .name-input-wrapper {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .num-badge {
      background: rgba(255,200,50,0.2);
      color: #ffc832;
      border-radius: 50%;
      width: 24px; height: 24px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    input[type="text"] {
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 0.5rem;
      color: #fff;
      padding: 0.5rem 0.75rem;
      font-size: 0.9rem;
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus { border-color: #ffc832; }
    input[type="text"]::placeholder { color: #666; }

    .candy-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .candy-row {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .candy-row input { flex: 1; }

    .delete-btn {
      background: rgba(255,50,50,0.2);
      border: 1px solid rgba(255,50,50,0.4);
      color: #ff6060;
      border-radius: 0.4rem;
      width: 32px; height: 32px;
      cursor: pointer;
      font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
    }

    .delete-btn:hover { background: rgba(255,50,50,0.4); }

    .add-btn {
      background: rgba(255,200,50,0.1);
      border: 1px dashed rgba(255,200,50,0.4);
      color: #ffc832;
      border-radius: 0.5rem;
      padding: 0.5rem 1rem;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
      width: 100%;
    }

    .add-btn:hover { background: rgba(255,200,50,0.2); }

    .save-btn {
      background: linear-gradient(135deg, #ffc832, #ff6b35);
      border: none;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 700;
      padding: 0.75rem 2rem;
      border-radius: 2rem;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
      margin-top: 1rem;
    }

    .save-btn:hover { opacity: 0.9; transform: scale(1.02); }

    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #23c55e;
      color: #fff;
      padding: 0.75rem 1.5rem;
      border-radius: 2rem;
      font-weight: 600;
      transition: transform 0.3s;
      z-index: 9999;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ── CONFETTI ── */
    .confetti-piece {
      position: fixed;
      width: 10px; height: 10px;
      top: -10px;
      border-radius: 2px;
      animation: confettiFall linear forwards;
      z-index: 9998;
      pointer-events: none;
    }

    @keyframes confettiFall {
      to {
        transform: translateY(110vh) rotate(720deg);
        opacity: 0;
      }
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      color: #666;
      padding: 2rem;
      font-size: 0.95rem;
    }

    .history-section { margin-top: 1.5rem; }
    .history-section h3 {
      font-size: 0.85rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 0.75rem;
    }

    @media (max-width: 500px) {
      h1 { font-size: 1.8rem; }
      .slot { width: 150px; font-size: 1rem; }
      .slot-item { width: 146px; font-size: 0.9rem; }
      .spin-btn { font-size: 1.1rem; padding: 0.8rem 2rem; }
    }
  </style>
</head>
<body>

<div class="container">
  <h1><span>🍬</span> Retro Snoep Generator</h1>
  <p class="subtitle">Wie haalt er snoep? En welk soort? Laat het lot beslissen!</p>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('generator')">🎰 Generator</button>
    <button class="tab" onclick="switchTab('teamleden')">👥 Teamleden</button>
    <button class="tab" onclick="switchTab('snoep')">🍫 Snoeplijst</button>
  </div>

  <!-- GENERATOR PANEL -->
  <div id="panel-generator" class="panel active">
    <div class="slot-machine">
      <div class="slots">
        <div class="slot-wrapper">
          <div class="slot-label">🧑 Wie?</div>
          <div class="slot" id="slot-person">
            <div class="slot-inner" id="slot-person-inner">
              <div class="slot-item">Druk op spin!</div>
            </div>
          </div>
        </div>
        <div class="slot-wrapper">
          <div class="slot-label">🍬 Wat?</div>
          <div class="slot" id="slot-candy">
            <div class="slot-inner" id="slot-candy-inner">
              <div class="slot-item">Druk op spin!</div>
            </div>
          </div>
        </div>
      </div>

      <button class="spin-btn" id="spinBtn" onclick="spin()">🎲 SPIN!</button>

      <div class="result-card" id="resultCard">
        <div class="result-person" id="resultPerson"></div>
        <div class="result-text">brengt deze sprint snoep voor het team 🎉</div>
        <div class="result-candy" id="resultCandy"></div>
      </div>
    </div>

    <div class="history-section">
      <div class="config-card">
        <h3>📋 Geschiedenis</h3>
        <div id="historyList">
          <div class="empty-state">Nog geen rondes gespeeld.</div>
        </div>
        <button class="add-btn" style="margin-top:1rem" onclick="clearHistory()">🗑 Geschiedenis wissen</button>
      </div>
    </div>
  </div>

  <!-- TEAMLEDEN PANEL -->
  <div id="panel-teamleden" class="panel">
    <div class="config-card">
      <h3>👥 Teamleden</h3>
      <div class="candy-list" id="nameGrid"></div>
      <button class="add-btn" onclick="addMember()">+ Teamlid toevoegen</button>
      <br>
      <button class="save-btn" onclick="saveNames()">💾 Opslaan</button>
    </div>
  </div>

  <!-- SNOEP PANEL -->
  <div id="panel-snoep" class="panel">
    <div class="config-card">
      <h3>🍫 Snoepsoorten</h3>
      <div class="candy-list" id="candyList"></div>
      <button class="add-btn" onclick="addCandy()">+ Snoep toevoegen</button>
      <br>
      <button class="save-btn" onclick="saveCandies()">💾 Opslaan</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── DEFAULTS ──────────────────────────────────────────────
  const DEFAULT_NAMES = [
    'Teamlid 1','Teamlid 2','Teamlid 3','Teamlid 4',
    'Teamlid 5','Teamlid 6','Teamlid 7','Teamlid 8'
  ];

  const DEFAULT_CANDIES = [
    'M&M\'s 🟤','Haribo Goudbeertjes 🐻','Stroopwafels 🍪',
    'Oreo\'s 🖤','Twix 🍫','Skittles 🌈','Djarum koeken 🧡',
    'Chips & Dip 🥔','Kitkat 🍫','Jellybeans 🫧',
    'Drop 🖤','Popcorn 🍿','Gevulde koeken 🍪','Trolli wormen 🐛',
    'Kinder Bueno 🤎','Salmiak 🌑','Bosco ballen 🟡'
  ];

  // ── STATE ─────────────────────────────────────────────────
  let names   = JSON.parse(localStorage.getItem('retro_names')   || 'null') || [...DEFAULT_NAMES];
  let candies = JSON.parse(localStorage.getItem('retro_candies') || 'null') || [...DEFAULT_CANDIES];
  let history = JSON.parse(localStorage.getItem('retro_history') || '[]');

  let spinning = false;

  // ── TABS ──────────────────────────────────────────────────
  function switchTab(id) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('panel-' + id).classList.add('active');
    event.target.classList.add('active');

    if (id === 'teamleden') renderNameGrid();
    if (id === 'snoep')     renderCandyList();
  }

  // ── NAME GRID ─────────────────────────────────────────────
  function renderNameGrid() {
    const grid = document.getElementById('nameGrid');
    grid.innerHTML = '';
    names.forEach((n, i) => {
      grid.innerHTML += `
        <div class="candy-row" id="name-row-${i}">
          <div class="num-badge" style="flex-shrink:0">${i+1}</div>
          <input type="text" id="name-${i}" value="${n}" placeholder="Naam ${i+1}">
          <button class="delete-btn" onclick="removeMember(${i})">✕</button>
        </div>`;
    });
  }

  function addMember() {
    names.push('');
    renderNameGrid();
    const last = document.getElementById('name-' + (names.length - 1));
    if (last) last.focus();
  }

  function removeMember(i) {
    if (names.length <= 1) { showToast('⚠️ Je hebt minimaal 1 teamlid nodig!'); return; }
    names.splice(i, 1);
    renderNameGrid();
  }

  function saveNames() {
    names = [];
    document.querySelectorAll('[id^="name-"]').forEach(el => {
      if (!el.matches('input')) return;
      const v = el.value.trim();
      if (v) names.push(v);
    });
    localStorage.setItem('retro_names', JSON.stringify(names));
    showToast('✅ Teamleden opgeslagen!');
  }

  // ── CANDY LIST ────────────────────────────────────────────
  function renderCandyList() {
    const list = document.getElementById('candyList');
    list.innerHTML = '';
    candies.forEach((c, i) => {
      list.innerHTML += `
        <div class="candy-row" id="candy-row-${i}">
          <input type="text" id="candy-${i}" value="${c}" placeholder="Snoepnaam">
          <button class="delete-btn" onclick="removeCandy(${i})">✕</button>
        </div>`;
    });
  }

  function addCandy() {
    candies.push('');
    renderCandyList();
    const last = document.getElementById('candy-' + (candies.length - 1));
    if (last) last.focus();
  }

  function removeCandy(i) {
    candies.splice(i, 1);
    renderCandyList();
  }

  function saveCandies() {
    candies = [];
    document.querySelectorAll('input[id^="candy-"]').forEach(el => {
      const v = el.value.trim();
      if (v) candies.push(v);
    });
    localStorage.setItem('retro_candies', JSON.stringify(candies));
    showToast('✅ Snoeplijst opgeslagen!');
  }

  // ── HISTORY ───────────────────────────────────────────────
  function renderHistory() {
    const list = document.getElementById('historyList');
    if (!history.length) {
      list.innerHTML = '<div class="empty-state">Nog geen rondes gespeeld.</div>';
      return;
    }
    list.innerHTML = [...history].reverse().map(h =>
      `<div class="history-item">
        <div class="dot"></div>
        <span><strong>${h.person}</strong> bracht <strong>${h.candy}</strong> &mdash; <small style="color:#777">${h.date}</small></span>
      </div>`
    ).join('');
  }

  function clearHistory() {
    if (!confirm('Geschiedenis wissen?')) return;
    history = [];
    localStorage.removeItem('retro_history');
    renderHistory();
  }

  // ── SPIN LOGIC ────────────────────────────────────────────
  function spin() {
    if (spinning) return;

    const validNames   = names.filter(n => n.trim());
    const validCandies = candies.filter(c => c.trim());

    if (!validNames.length) {
      showToast('⚠️ Voeg eerst teamleden toe!'); return;
    }
    if (!validCandies.length) {
      showToast('⚠️ Voeg eerst snoepsoorten toe!'); return;
    }

    spinning = true;
    document.getElementById('spinBtn').disabled = true;
    document.getElementById('resultCard').classList.remove('show');
    document.getElementById('slot-person').classList.remove('winner');
    document.getElementById('slot-candy').classList.remove('winner');

    const finalPerson = validNames[Math.floor(Math.random() * validNames.length)];
    const finalCandy  = validCandies[Math.floor(Math.random() * validCandies.length)];

    animateSlot('slot-person-inner', validNames, finalPerson, 2000, () => {
      document.getElementById('slot-person').classList.add('winner');
    });

    animateSlot('slot-candy-inner', validCandies, finalCandy, 2400, () => {
      document.getElementById('slot-candy').classList.add('winner');

      // Show result
      document.getElementById('resultPerson').textContent = '🎉 ' + finalPerson;
      document.getElementById('resultCandy').textContent = finalCandy;
      document.getElementById('resultCard').classList.add('show');

      // Save to history
      history.push({
        person: finalPerson,
        candy:  finalCandy,
        date:   new Date().toLocaleDateString('nl-NL', { day:'numeric', month:'short', year:'numeric' })
      });
      localStorage.setItem('retro_history', JSON.stringify(history));
      renderHistory();

      // Confetti!
      launchConfetti();

      spinning = false;
      document.getElementById('spinBtn').disabled = false;
    });
  }

  function animateSlot(innerId, items, finalValue, duration, onDone) {
    const inner = document.getElementById(innerId);
    const totalCycles = Math.floor(duration / 80);
    let count = 0;

    function step() {
      if (count >= totalCycles) {
        inner.innerHTML = `<div class="slot-item">${finalValue}</div>`;
        if (onDone) onDone();
        return;
      }

      const progress = count / totalCycles;
      const delay = 60 + progress * progress * 180;

      const item = items[Math.floor(Math.random() * items.length)];
      inner.innerHTML = `<div class="slot-item">${item}</div>`;
      count++;
      setTimeout(step, delay);
    }

    step();
  }

  // ── CONFETTI ──────────────────────────────────────────────
  function launchConfetti() {
    const colors = ['#ffc832','#ff6b35','#23c55e','#3b82f6','#a855f7','#ec4899','#fff'];
    for (let i = 0; i < 80; i++) {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.cssText = `
        left: ${Math.random() * 100}vw;
        background: ${colors[Math.floor(Math.random() * colors.length)]};
        width: ${6 + Math.random() * 8}px;
        height: ${6 + Math.random() * 8}px;
        border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
        animation-duration: ${1.5 + Math.random() * 2}s;
        animation-delay: ${Math.random() * 0.5}s;
      `;
      document.body.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }
  }

  // ── TOAST ─────────────────────────────────────────────────
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // ── INIT ──────────────────────────────────────────────────
  renderHistory();
</script>
</body>
</html>
